name: Build APK
on:
  push:
    branches: [ master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '22.0.0'
          cache: 'npm'
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Install dependencies
        run: |
          echo "=== Installing dependencies ==="
          npm --version
          node --version
          ls -la
          npm install || {
            echo "=== npm install failed ==="
            exit 1
          }
      - name: Install Capacitor
        run: |
          echo "=== Installing Capacitor ==="
          npm install @capacitor/core @capacitor/cli @capacitor/android || {
            echo "=== npm install Capacitor failed ==="
            exit 1
          }
      - name: Build web app
        run: |
          echo "=== Building web app ==="
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          echo "Current directory: $(pwd)"
          echo "Listing files before build:"
          ls -la
          # Try with expo export
          echo "Running expo export..."
          npx expo export --platform web
          echo "Listing files after expo export:"
          ls -la
          # Check if web-build exists
          if [ -d "web-build" ]; then
            echo "web-build directory exists. Contents:"
            ls -la web-build/
          else
            echo "web-build directory does not exist."
            # Try with npm run build if it exists
            if grep -q "build" package.json; then
              echo "Running npm run build..."
              npm run build
              echo "Listing files after npm run build:"
              ls -la
            else
              echo "No build script found in package.json."
            fi
          fi
      - name: Sync Capacitor
        run: |
          echo "=== Syncing Capacitor ==="
          echo "Current directory: $(pwd)"
          echo "Listing files before sync:"
          ls -la
          if [ -d "web-build" ]; then
            echo "web-build directory exists. Contents:"
            ls -la web-build/
          else
            echo "web-build directory does not exist. Creating empty directory..."
            mkdir -p web-build
            echo "<!DOCTYPE html><html><head><title>Expo App</title></head><body><h1>Hello World</h1></body></html>" > web-build/index.html
            echo "Created web-build/index.html"
          fi
          npx cap sync
      - name: Build Android
        run: |
          echo "=== Building Android ==="
          cd android
          ls -la
          chmod +x gradlew
          ./gradlew --version
          ./gradlew assembleDebug --info || {
            echo "=== gradle build failed ==="
            exit 1
          }
      - name: Check APK existence
        run: |
          echo "=== Checking APK existence ==="
          ls -la android/app/build/outputs/apk/debug/
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
